name: Package AI Studio ZIP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual triggers on GitHub UI

jobs:
  pack:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Configure zero-dependency environment for AI Studio compatibility
        run: |
          node -e "
            const fs = require('fs');
            // 1. Zero out dependencies in package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies = {};
            pkg.devDependencies = {};
            pkg.scripts = {
              'dev': 'node dev-runner.cjs',
              'start': 'node dev-runner.cjs',
              'build': 'echo \"Build bypassed\"',
              'preview': 'node dev-runner.cjs'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2), 'utf8');

            // 2. Create zero-dependency dev-runner.cjs HTTP server
            const zeroDepRunnerContent = \`const http = require('http');
            const fs = require('fs');
            const path = require('path');

            const mimeTypes = {
              '.html': 'text/html',
              '.css': 'text/css',
              '.js': 'application/javascript',
              '.json': 'application/json',
              '.png': 'image/png',
              '.jpg': 'image/jpeg',
              '.gif': 'image/gif',
              '.svg': 'image/svg+xml',
              '.ico': 'image/x-icon',
              '.wasm': 'application/wasm',
              '.worker.js': 'application/javascript'
            };

            const port = process.env.PORT || '3000';
            const publicDir = path.resolve(__dirname, 'prebuilt-dist');

            // Auto kill existing process on the port to prevent port collision and force reload
            try {
              const cp = require('child_process');
              const pid = cp.execSync('lsof -t -i:' + port, { encoding: 'utf8' }).trim();
              if (pid) {
                console.log('Port ' + port + ' is occupied by PID ' + pid + '. Killing it to force reload...');
                cp.execSync('kill -9 ' + pid);
              }
            } catch (e) {}

            const server = http.createServer((req, res) => {
              let urlPath = req.url.split('?')[0];
              
              // Strip subpaths to support reverse proxy deployment (like AI Studio applet paths)
              const assetsIdx = urlPath.indexOf('/assets/');
              if (assetsIdx !== -1) {
                urlPath = urlPath.substring(assetsIdx);
              }

              let filePath = path.join(publicDir, urlPath);
              if (filePath === publicDir || filePath.endsWith('/')) {
                filePath = path.join(filePath, 'index.html');
              }

              if (!filePath.startsWith(publicDir)) {
                res.statusCode = 403;
                res.end('Forbidden');
                return;
              }

              fs.stat(filePath, (err, stats) => {
                if (err || !stats.isFile()) {
                  filePath = path.join(publicDir, 'index.html');
                }

                const ext = path.extname(filePath).toLowerCase();
                const contentType = mimeTypes[ext] || 'application/octet-stream';

                res.writeHead(200, { 'Content-Type': contentType });
                fs.createReadStream(filePath).pipe(res);
              });
            });

            server.listen(Number(port), '0.0.0.0', () => {
              console.log(\\\`Zero-dependency HTTP server running at http://0.0.0.0:\\\${port}/\\\`);
            });\`;
            fs.writeFileSync('dev-runner.cjs', zeroDepRunnerContent, 'utf8');
          "

      - name: Package lightweight ZIP for AI Studio
        run: |
          zip -r "ai-toolkit-源码-v${{ env.VERSION }}.zip" . \
              -x "node_modules/*" \
              -x "**/node_modules/*" \
              -x ".git/*" \
              -x "dist/*" \
              -x "dist-electron/*" \
              -x "electron/*" \
              -x "functions/*" \
              -x "*.backup*" \
              -x "**/*.backup*" \
              -x ".playwright-mcp/*" \
              -x ".vscode/*" \
              -x ".DS_Store" \
              -x "AI创作工具包-*/*" \
              -x "ai-toolkit-*/*" \
              -x "版本归档/*" \
              -x "未命名文件夹/*" \
              -x "backups/*" \
              -x "docs/*" \
              -x "functions/node_modules/*"

      - name: Upload AI Studio ZIP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-toolkit-aistudio-v${{ env.VERSION }}
          path: ai-toolkit-源码-v${{ env.VERSION }}.zip
          retention-days: 7
