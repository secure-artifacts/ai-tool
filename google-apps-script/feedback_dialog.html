<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { height: 100%; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f8fb; color: #222; overflow: auto; }
    .wrap {
      padding: 8px 10px 10px;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      padding: 4px 2px;
      min-height: 36px;
    }
    .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    .field select, .field input, .field textarea {
      width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d8d8d8; border-radius: 7px; font-size: 14px;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(260px, 0.95fr) minmax(340px, 1.45fr) minmax(300px, 1fr);
      gap: 12px;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      width: 100%;
      overflow: auto;
    }
    .card {
      background: #fff;
      border: 1px solid #e7e7e7;
      border-radius: 10px;
      padding: 12px;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .workspace > .card:nth-child(3) {
      overflow-y: auto;
    }
    .title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #666; margin-top: 6px; }
    .hidden { display: none; }
    .status {
      margin-left: auto;
      font-size: 11px;
      color: #667085;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .counter {
      font-size: 11px;
      color: #2d4bd3;
      font-weight: 700;
      background: #edf2ff;
      border: 1px solid #dbe6ff;
      border-radius: 999px;
      padding: 3px 8px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .link { display: none; font-size: 12px; word-break: break-all; margin-top: 6px; }
    .topbar .field {
      width: 220px;
      min-width: 190px;
      flex: 0 0 220px;
    }
    .topbar .field label { display: none; }
    .topbar .field select { padding: 5px 8px; font-size: 12px; min-height: 32px; }
    .topbar button { padding: 6px 10px; font-size: 12px; white-space: nowrap; }
    .btn-icon { display: inline-flex; align-items: center; gap: 5px; }
    .btn-icon .ic { font-size: 12px; line-height: 1; opacity: 0.78; }

    .preview-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      min-width: 0;
    }
    .preview-header .title {
      margin: 0;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 0;
      flex-wrap: nowrap;
      flex: 1 1 auto;
      min-width: 0;
    }
    .preview-toolbar .field {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .preview-toolbar .field label {
      font-size: 11px;
      margin: 0;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .preview-toolbar .field select {
      min-height: 30px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .preview-actions { display: flex; align-items: center; gap: 4px; }
    .preview-actions .preview-btn {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 7px;
      line-height: 1.1;
    }
    .preview-zoom-label {
      min-width: 46px;
      text-align: center;
      font-size: 11px;
      color: #3b4d7b;
      background: #eef2ff;
      border: 1px solid #dce5ff;
      border-radius: 7px;
      padding: 5px 4px;
      box-sizing: border-box;
    }
    .media-box {
      width: 100%;
      height: auto;
      flex: 1 1 auto;
      min-height: 360px;
      background: #f1f3f7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .media-box img, .media-box video, .media-box iframe { max-width: 100%; max-height: 100%; width: 100%; height: 100%; object-fit: contain; border: 0; }
    .zoom-target { transition: transform 0.06s linear; transform-origin: center center; }
    .text-box { white-space: pre-wrap; font-size: 13px; padding: 12px; width: 100%; height: 100%; overflow: auto; }

    .preview-box-wrapper {
      position: relative;
      flex: 1 1 auto;
      display: flex;
      width: 100%;
      min-height: 360px;
    }
    .preview-box-wrapper .media-box {
      flex: 1 1 auto;
      min-height: 0;
      margin: 0;
      border-radius: 8px;
    }
    .nav-float-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 64px;
      background: rgba(0, 0, 0, 0.25);
      color: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, transform 0.1s;
      z-index: 10;
      backdrop-filter: blur(2px);
    }
    .preview-box-wrapper:hover .nav-float-btn {
      opacity: 1;
    }
    .nav-float-btn:hover {
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
    }
    .nav-float-btn:active {
      transform: translateY(-50%) scale(0.95);
    }
    .nav-float-btn.nav-left { left: 12px; }
    .nav-float-btn.nav-right { right: 12px; }

    .rows-panel-controls { margin-bottom: 8px; }
    .header-checks { max-height: 120px; overflow: auto; border: 1px solid #e4e4e4; border-radius: 8px; padding: 6px; background: #fafafa; }
    .header-check-item { display: flex; align-items: center; gap: 6px; font-size: 12px; margin: 4px 0; }
    .row-list {
      margin-top: 10px;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #ececec;
      border-radius: 8px;
    }
    .row-item { padding: 8px; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
    .row-item:last-child { border-bottom: 0; }
    .row-item.active { background: #eef3ff; }
    .row-item.folder-warning { background: #fff6f6; }
    .row-item.folder-warning.active { background: #ffeef0; }
    .row-body { display: flex; gap: 8px; align-items: flex-start; }
    .row-meta { min-width: 0; flex: 1; }
    .row-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      border: 1px solid #e3e8f5;
      background: #f2f5ff;
      flex: 0 0 56px;
      object-fit: cover;
      display: block;
    }
    .row-thumb-video {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5d8f;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .row-item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .row-head-right { display: inline-flex; align-items: center; gap: 6px; }
    .row-tag { font-size: 12px; font-weight: 700; color: #2d4bd3; }
    .row-status { font-size: 11px; padding: 2px 6px; border-radius: 10px; background: #f1f3f7; color: #444; }
    .row-status-warning { background: #ffe3e3; color: #b71c1c; }
    .row-status-pass { background: #d8f0d0; color: #167a45; }
    .row-status-edit { background: #f8dcc7; color: #8f4c13; }
    .row-status-reject { background: #f5d5d5; color: #b42318; }
    .row-status-unknown { background: #eceff6; color: #4c5875; }
    .row-sync { font-size: 11px; padding: 2px 6px; border-radius: 10px; background: #eef2ff; color: #3b4d7b; }
    .row-sync-dirty { background: #fff6db; color: #7f5600; }
    .row-sync-saving { background: #eef4ff; color: #2b5fcf; }
    .row-sync-saved { background: #e8f7ee; color: #167a45; }
    .row-sync-submitting { background: #eaf2ff; color: #1f55cc; }
    .row-sync-submitted { background: #e5f7ec; color: #0e7a43; }
    .row-sync-failed { background: #ffe9e9; color: #b42318; }
    .row-cell-line { font-size: 12px; color: #333; margin: 2px 0; }
    .row-advice-line { color: #1f3e8a; font-weight: 600; }
    .row-cell-key { color: #666; }
    .row-warning { font-size: 11px; color: #c62828; margin-top: 4px; }

    .shot-preview-list {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
      gap: 8px;
      min-height: 0;
    }
    .shot-item {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e3e8f5;
      background: #f1f3f7;
    }
    .shot-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .shot-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 0;
      background: rgba(22, 30, 54, 0.72);
      color: #fff;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      padding: 0;
      cursor: pointer;
    }
    .shot-status {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 10px;
      padding: 2px 4px;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }
    .shot-status.done {
      background: rgba(14, 122, 67, 0.85);
    }
    .shot-status.error {
      background: rgba(180, 35, 24, 0.85);
    }
    .shot-picker {
      width: 100%;
      min-height: 52px;
      border: 1px dashed #c7cfdf;
      border-radius: 8px;
      background: #f7f9ff;
      color: #2f3d63;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      margin-top: 4px;
      padding: 8px;
      text-align: center;
      box-sizing: border-box;
    }
    .shot-picker:focus {
      outline: 2px solid #9cb3ff;
      outline-offset: 1px;
    }
    .shot-picker.active {
      border-color: #8aa1f4;
      background: #edf2ff;
    }
    .actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
    button { border: 0; padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-main { background: #2d4bd3; color: #fff; }
    .btn-sub { background: #eceff6; color: #333; }
    .btn-warn { background: #fff5f5; color: #c62828; border: 1px solid #ffcaca; }

    .settings-panel {
      margin-bottom: 8px;
      flex: 0 0 auto;
      max-height: 48vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .settings-grid { display: grid; gap: 8px; max-height: 32vh; overflow-y: auto; overflow-x: hidden; padding-right: 2px; }
    .setting-row { display: grid; grid-template-columns: 150px 110px 1fr 140px; gap: 8px; align-items: center; }
    .setting-label { font-size: 12px; color: #333; font-weight: 700; }
    .settings-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      position: sticky;
      bottom: 0;
      padding-top: 8px;
      background: #fff;
      border-top: 1px solid #f0f1f6;
    }
    .settings-basic {
      display: grid;
      grid-template-columns: 110px 140px 1fr;
      gap: 8px;
      align-items: center;
      margin: 4px 0 8px;
    }
    .settings-basic .setting-label {
      margin: 0;
    }
    .settings-basic .hint {
      margin: 0;
      font-size: 11px;
    }
    .inline-check {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      font-size: 12px;
      color: #666;
      font-weight: 400;
    }
    .mapped-col-hint {
      margin-left: 6px;
      font-size: 11px;
      color: #60729d;
      font-weight: 500;
    }
    .field-compact select {
      height: 34px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .quick-options {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .quick-btn {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #dbe3f7;
      background: #f7f9ff;
      color: #344674;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      user-select: none;
    }
    .review-group-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .group-tab-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #dbe3f7;
      background: #f7f9ff;
      color: #344674;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
      text-align: center;
      transition: all 0.2s;
    }
    .group-tab-btn:hover {
      background: #eef2ff;
      border-color: #8aa1f4;
    }
    .group-tab-btn.active {
      background: #2d4bd3;
      border-color: #2d4bd3;
      color: #fff;
      box-shadow: 0 2px 6px rgba(45, 75, 211, 0.3);
    }
    .group-tab-btn[disabled] {
      opacity: 0.62;
      cursor: not-allowed;
    }
    .group-switch-hint {
      margin-top: 6px;
      min-height: 16px;
      font-size: 12px;
      color: #667085;
      line-height: 1.35;
    }
    .group-switch-hint.busy {
      color: #2d4bd3;
      font-weight: 600;
    }

    @media (max-width: 1180px) {
      .topbar { flex-wrap: wrap; row-gap: 6px; }
      .topbar .field { width: min(100%, 260px); flex: 1 1 220px; }
      .topbar .status { margin-left: 0; max-width: none; flex: 1 1 100%; }
      .workspace {
        grid-template-columns: minmax(260px, 0.95fr) minmax(340px, 1.45fr) minmax(300px, 1fr);
        min-width: 980px;
        overflow-x: auto;
        overflow-y: hidden;
      }
      .workspace > .card:nth-child(3) {
        overflow-y: auto;
      }
      .preview-actions {
        justify-content: flex-start;
        flex-wrap: wrap;
      }
      .media-box {
        min-height: 260px;
      }
    }

    @media (max-height: 860px) {
      .media-box {
        min-height: 220px;
      }
      .settings-panel {
        max-height: 42vh;
      }
      .settings-grid {
        max-height: 28vh;
      }
    }
  </style>
</head>
<body>
  <!-- 加载占位：在 GAS 初始化返回前显示 -->
  <div id="loadingOverlay" style="
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    background: #f7f8fb; color: #555; font-family: Arial, sans-serif;
  ">
    <div style="width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #2d4bd3; border-radius: 50%; animation: spin-loader .7s linear infinite;"></div>
    <div id="loadingOverlayText" style="font-size: 14px;">正在加载，请稍候...</div>
    <style>@keyframes spin-loader { to { transform: rotate(360deg); } }</style>
  </div>
  <div class="wrap" id="mainWrap">
    <div class="topbar">
      <div class="field">
        <label>选择行（当前批次）</label>
        <select id="rowSelect" aria-label="选择行（当前批次）"></select>
      </div>
      <div class="counter" id="counter">-</div>
      <button class="btn-sub btn-icon" type="button" onclick="goPrev()">
        <span class="ic" aria-hidden="true">&#9664;</span><span>上一条</span>
      </button>
      <button class="btn-sub btn-icon" type="button" onclick="goNext()">
        <span class="ic" aria-hidden="true">&#9654;</span><span>下一条</span>
      </button>
      <button class="btn-sub btn-icon" type="button" onclick="toggleSettings()">
        <span class="ic" aria-hidden="true">&#9881;</span><span>列设置</span>
      </button>
      <button class="btn-sub btn-icon" type="button" onclick="toggleMiniMode()" title="缩小窗口，方便查看背后的表格">
        <span class="ic" aria-hidden="true">🗕</span><span>迷你窗口</span>
      </button>
      <div id="status" class="status">加载中...</div>
    </div>

    <div id="settingsPanel" class="card settings-panel hidden">
      <div class="title">列设置</div>
      <div class="hint">保存后会记住，下次打开自动加载。审核人/审核状态/严重程度的“选项来源”只按范围读取（如：数据验证!B2:B），不再从来源列推断。自动匹配遇到“审核人员1/2/3”这类多列时不会强制猜测。</div>
      <div class="settings-basic">
        <div class="setting-label">表头行</div>
        <select id="headerRowSelect"></select>
        <div id="headerRowHint" class="hint"></div>
      </div>
      <div id="settingsRows" class="settings-grid"></div>
      <div class="settings-actions">
        <button class="btn-sub" type="button" onclick="autoMatchByHeader()">按表头自动匹配</button>
        <button class="btn-sub" type="button" onclick="renderSettingsRows()">重置未保存修改</button>
        <button class="btn-main" type="button" onclick="saveSettings()">保存设置</button>
      </div>
    </div>

    <div class="workspace">
      <div class="card">
        <div class="title">选中行面板（可多列）</div>
        <div class="rows-panel-controls">
          <div class="hint">勾选要显示的列</div>
          <div id="panelHeaderChecks" class="header-checks"></div>
        </div>
        <div id="rowList" class="row-list"></div>
      </div>

      <div class="card">
        <div class="preview-header">
          <div class="title">内容预览</div>
          <div class="preview-toolbar">
            <div class="field">
              <label>预览列</label>
              <select id="viewHeaderSelect"></select>
            </div>
            <div class="preview-actions">
              <button class="btn-sub preview-btn" type="button" onclick="goPrev()" title="上一条记录（快捷键：左箭头，需在非输入框下）">◀</button>
              <button class="btn-sub preview-btn" type="button" onclick="goNext()" title="下一条记录（快捷键：右箭头，需在非输入框下）">▶</button>
              <div style="width: 8px;"></div>
              <button id="zoomOutBtn" class="btn-sub preview-btn" type="button" onclick="zoomOutPreview()" title="缩小">-</button>
              <div id="zoomLabel" class="preview-zoom-label">100%</div>
              <button id="zoomInBtn" class="btn-sub preview-btn" type="button" onclick="zoomInPreview()" title="放大">+</button>
              <button id="zoomResetBtn" class="btn-sub preview-btn" type="button" onclick="resetPreviewZoom(true)" title="重置缩放">重置</button>
              <button id="downloadBtn" class="btn-sub preview-btn" type="button" onclick="downloadCurrentPreview()" title="下载当前预览">下载</button>
            </div>
          </div>
        </div>
        <div class="preview-box-wrapper">
          <div id="previewBox" class="media-box">暂无内容</div>
          <button class="nav-float-btn nav-left" onclick="goPrev()" title="上一条">❮</button>
          <button class="nav-float-btn nav-right" onclick="goNext()" title="下一条">❯</button>
        </div>
        <div id="sourceLink" class="link"></div>
      </div>

      <div class="card">
        <div class="title">反馈填写（自动保存）</div>

        <div class="field field-compact">
          <label>审核组快速切换</label>
          <div id="reviewGroupButtons" class="review-group-btns"></div>
          <div id="reviewGroupSwitchHint" class="group-switch-hint"></div>
        </div>

        <div class="field">
          <label>审核人
            <span id="reviewerMappedHeader" class="mapped-col-hint"></span>
            <span class="inline-check">
              <input id="syncReviewerToggle" type="checkbox" checked />
              统一剩余行
            </span>
          </label>
          <select id="reviewer"></select>
          <div id="reviewerQuick" class="quick-options"></div>
        </div>

        <div class="field">
          <label>本次审核结果<span id="reviewResultMappedHeader" class="mapped-col-hint"></span></label>
          <select id="reviewResult"></select>
          <div id="reviewResultQuick" class="quick-options"></div>
        </div>

        <div class="field">
          <label>严重程度<span id="severityMappedHeader" class="mapped-col-hint"></span></label>
          <select id="severity"></select>
          <div id="severityQuick" class="quick-options"></div>
        </div>

        <div class="field">
          <label>建议反馈<span id="textAdviceMappedHeader" class="mapped-col-hint"></span></label>
          <textarea id="textAdvice" placeholder="输入反馈建议"></textarea>
        </div>

        <div class="field">
          <label>建议截图（上传或粘贴）
            <span id="shotLinkMappedHeader" class="mapped-col-hint"></span>
            <span id="shotFormulaMappedHeader" class="mapped-col-hint" style="margin-left: 10px; color: #667085;"></span>
          </label>
          <input id="fileInput" type="file" accept="image/*" multiple style="display:none;" />
          <div id="shotPicker" class="shot-picker" tabindex="0">单击选中后粘贴 / 双击选择文件（可多选）</div>
          <div id="shotPreviewList" class="shot-preview-list"></div>
          <div class="hint">单击先选中截图区，再按 Ctrl/Cmd + V 手动粘贴。支持一次粘贴多张。</div>
        </div>

        <div class="actions">
          <button class="btn-warn" type="button" onclick="clearShot()">清空截图</button>
          <button class="btn-sub" type="button" onclick="submitAllReviewed()">批量提交已填写</button>
          <button class="btn-sub" type="button" onclick="google.script.host.close()">关闭</button>
          <button class="btn-main" type="button" onclick="submitData(false)">提交</button>
          <button class="btn-main" type="button" onclick="submitData(true)">提交并下一条</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let init = null;
    let currentSettings = null;
    let currentIndex = 0;
    let screenshotDataUrls = [];
    let clearScreenshotFlag = false;
    let rowsDataMap = {};
    let autoSaveTimer = null;
    let autoSaveSeq = 0;
    let isApplyingRow = false;
    let shotPickerSelected = false;
    let previewScale = 1;
    let previewPanX = 0;
    let previewPanY = 0;
    let isPreviewDragging = false;
    let previewDragStartX = 0;
    let previewDragStartY = 0;
    let currentPreviewType = 'none';
    let currentPreviewUrl = '';
    let sharedReviewerValue = '';
    let reviewGroupPairs = [];
    let isReviewGroupSwitching = false;
    let reviewGroupSwitchHintTimer = null;
    const AUTO_FORCE_WRITE_ON_VALIDATION_MISMATCH = true;
    const ENABLE_VIDEO_THUMB_PRELOAD_IN_LIST = false;
    const FALLBACK_REVIEW_RESULT_OPTIONS = ['通过', '需修改', '驳回', '已反馈'];
    const FALLBACK_SEVERITY_OPTIONS = ['低', '中', '高', '紧急'];

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function toggleFullScreenLoading(show, text) {
      const overlay = document.getElementById('loadingOverlay');
      const overlayText = document.getElementById('loadingOverlayText');
      if (overlay && overlayText) {
        if (show) {
          overlayText.textContent = text || '正在加载，请稍候...';
          overlay.style.background = 'rgba(247, 248, 251, 0.8)';
          overlay.style.display = 'flex';
        } else {
          overlay.style.display = 'none';
          overlay.style.background = '#f7f8fb'; // 恢复原状
        }
      }
    }

    function setReviewGroupSwitchHint(text, busy) {
      const el = document.getElementById('reviewGroupSwitchHint');
      if (el) {
        el.textContent = String(text || '');
        if (busy) el.classList.add('busy');
        else el.classList.remove('busy');
      }

      // 复用全屏 Loading 蒙层
      toggleFullScreenLoading(busy, text);
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj || {}));
    }

    function getFieldDefByKey(fieldKey) {
      const defs = init && Array.isArray(init.fieldDefs) ? init.fieldDefs : [];
      for (let i = 0; i < defs.length; i++) {
        if (defs[i] && defs[i].key === fieldKey) return defs[i];
      }
      return null;
    }

    function columnLetterToIndexClient(letter) {
      const s = String(letter || '').trim().toUpperCase();
      if (!/^[A-Z]+$/.test(s)) return 0;
      let n = 0;
      for (let i = 0; i < s.length; i++) {
        n = n * 26 + (s.charCodeAt(i) - 64);
      }
      return n;
    }

    function getFieldTokenFromCurrentSettings(fieldKey) {
      const columns = (currentSettings && currentSettings.columns) ? currentSettings.columns : {};
      const cfg = columns[fieldKey] || {};
      const mode = String(cfg.mode || '').toLowerCase();
      const value = String(cfg.value || '').trim();
      const headerOptions = getHeaderOptionsList();

      if (mode === 'header') {
        const def = getFieldDefByKey(fieldKey);
        const fallbackHeader = def ? def.defaultHeader : '';
        return resolveHeaderSelectionToken(value, fallbackHeader, !!(def && def.optional), headerOptions);
      }
      if (mode === 'letter') {
        const idx = columnLetterToIndexClient(value);
        return idx > 0 ? ('__COL__' + idx) : '';
      }
      return '';
    }

    function getHeaderOptionByToken(token) {
      const t = String(token || '').trim();
      if (!t) return null;
      const list = getHeaderOptionsList();
      for (let i = 0; i < list.length; i++) {
        if (String(list[i].token || '') === t) return list[i];
      }
      return null;
    }

    function getMappedColumnLabel(fieldKey) {
      const columns = (currentSettings && currentSettings.columns) ? currentSettings.columns : {};
      const cfg = columns[fieldKey] || {};
      const mode = String(cfg.mode || 'header').toLowerCase();
      const value = String(cfg.value || '').trim();
      const def = getFieldDefByKey(fieldKey);
      const isOptional = !!(def && def.optional);

      if (mode === 'range') {
        return value ? ('按范围：' + value) : '按范围（未设置）';
      }

      if (mode === 'letter') {
        if (!value) return isOptional ? '未设置' : '未设置';
        const idx = columnLetterToIndexClient(value);
        if (!idx) return value + ' 列';
        const opt = getHeaderOptionByToken('__COL__' + idx);
        if (opt) return opt.label;
        return value + ' 列';
      }

      const token = getFieldTokenFromCurrentSettings(fieldKey);
      if (token) {
        const opt = getHeaderOptionByToken(token);
        if (opt) return opt.label;
      }
      if (value) return value;
      return isOptional ? '未设置' : '未设置';
    }

    function renderMappedColumnHints() {
      const fieldKeys = ['reviewer', 'reviewResult', 'severity', 'textAdvice', 'shotLink', 'shotFormula'];
      for (let i = 0; i < fieldKeys.length; i++) {
        const key = fieldKeys[i];
        const el = document.getElementById(key + 'MappedHeader');
        if (!el) continue;
        
        const cur = getFieldTokenFromCurrentSettings(key);
        if (cur) {
          const opt = getHeaderOptionByToken(cur);
          const h = opt ? opt.label : cur;
          if (key === 'reviewResult') {
            el.textContent = ' (本次审核结果列: ' + h + ')';
          } else if (key === 'shotFormula') {
            el.textContent = ' (公式列: ' + h + ')';
          } else if (key === 'shotLink') {
            el.textContent = ' (链接列: ' + h + ')';
          } else {
            el.textContent = ' (当前列: ' + h + ')';
          }
        } else {
          el.textContent = ' (未绑定)';
        }
      }
    }

    function parseReviewerGroupId(header) {
      const text = String(header || '').replace(/\s+/g, '');
      if (!text) return '';
      let m = text.match(/(?:审核人员|审核人|reviewer)(\d+)$/i);
      if (m && m[1]) return m[1];
      m = text.match(/(?:审核人员|审核人|reviewer)[^\d]*?(\d+)$/i);
      return (m && m[1]) ? m[1] : '';
    }

    function parseReviewResultGroupId(header) {
      const text = String(header || '').replace(/\s+/g, '');
      if (!text) return '';
      let m = text.match(/(?:审核结果|审核状态|result|status)(\d+)$/i);
      if (m && m[1]) return m[1];
      m = text.match(/(?:审核结果|审核状态|result|status)[^\d]*?(\d+)$/i);
      return (m && m[1]) ? m[1] : '';
    }

    function parseSeverityGroupId(header) {
      const text = String(header || '').replace(/\s+/g, '');
      if (!text) return '';
      let m = text.match(/(?:严重程度|severity)(\d+)$/i);
      if (m && m[1]) return m[1];
      m = text.match(/(?:严重程度|severity)[^\d]*?(\d+)$/i);
      return (m && m[1]) ? m[1] : '';
    }

    function detectReviewGroupPairs() {
      const headerOptions = getHeaderOptionsList();
      const byId = {};

      // 语义关键词（顺序从长到短，防止"审核人员"被"审核人"截断）
      const KEYWORDS = [
        { kw: '\u5ba1\u6838\u4eba\u5458', role: 'reviewer' }, // 审核人员
        { kw: '\u5ba1\u6838\u72b6\u6001', role: 'reviewResult' }, // 审核状态
        { kw: '\u5ba1\u6838\u7ed3\u679c', role: 'reviewResult' }, // 审核结果
        { kw: '\u5ba1\u6838\u4eba',   role: 'reviewer' }, // 审核人
        { kw: '\u4e25\u91cd\u7a0b\u5ea6', role: 'severity' }, // 严重程度
        
        { kw: '\u5efa\u8bae\u622a\u56fe\u94fe\u63a5', role: 'shotLink' }, // 建议截图链接
        { kw: '\u622a\u56fe\u94fe\u63a5', role: 'shotLink' }, // 截图链接
        { kw: '\u6807\u6ce8\u94fe\u63a5', role: 'shotLink' }, // 标注链接
        { kw: '\u53cd\u9988\u94fe\u63a5', role: 'shotLink' }, // 反馈链接
        { kw: '\u6807\u6ce8',         role: 'shotLink' }, // 标注
        
        { kw: '\u5efa\u8bae\u622a\u56fe\u516c\u5f0f', role: 'shotFormula' }, // 建议截图公式
        { kw: '\u622a\u56fe\u516c\u5f0f', role: 'shotFormula' }, // 截图公式
        { kw: '\u56fe\u7247\u516c\u5f0f', role: 'shotFormula' }, // 图片公式
        { kw: '\u7f29\u7565\u56fe',   role: 'shotFormula' }, // 缩略图
        { kw: '\u914d\u56fe',         role: 'shotFormula' }, // 配图
        
        { kw: '\u6587\u5b57\u5efa\u8bae', role: 'textAdvice' }, // 文字建议
        { kw: '\u5efa\u8bae\u53cd\u9988', role: 'textAdvice' }, // 建议反馈
        { kw: '\u5ba1\u6838\u5efa\u8bae', role: 'textAdvice' }, // 审核建议
        { kw: '\u5177\u4f53\u5efa\u8bae', role: 'textAdvice' }, // 具体建议
        { kw: '\u53cd\u9988\u5efa\u8bae', role: 'textAdvice' }, // 反馈建议
        { kw: '\u5efa\u8bae',         role: 'textAdvice' } // 建议
      ];

      for (let i = 0; i < headerOptions.length; i++) {
        const opt = headerOptions[i];
        const h = String(opt.header || '').replace(/\s+/g, '');

        // 必须有数字结尾
        const m = h.match(/^(.*?)(\d+)$/);
        if (!m) continue;
        const base = m[1]; // 数字前的部分，如"返修审核人员"
        const num  = m[2]; // 末尾数字

        // 匹配关键词，提取前缀
        let matched = null;
        for (let k = 0; k < KEYWORDS.length; k++) {
          const idx = base.indexOf(KEYWORDS[k].kw);
          if (idx >= 0) {
            matched = { prefix: base.slice(0, idx), role: KEYWORDS[k].role };
            break;
          }
        }
        if (!matched) continue;

        // 组ID = "前缀:数字"，让"审核组1"和"返修组1"严格隔离
        const groupKey = matched.prefix + ':' + num;
        if (!byId[groupKey]) byId[groupKey] = { id: groupKey, num: num, prefix: matched.prefix };
        const target = byId[groupKey];

        if (matched.role === 'reviewer') {
          target.reviewerToken  = opt.token;
          target.reviewerHeader = opt.header;
        } else if (matched.role === 'reviewResult') {
          target.reviewResultToken  = opt.token;
          target.reviewResultHeader = opt.header;
        } else if (matched.role === 'severity') {
          target.severityToken = opt.token;
        } else if (matched.role === 'shotLink') {
          target.shotLinkToken = opt.token;
        } else if (matched.role === 'shotFormula') {
          target.shotFormulaToken = opt.token;
        } else if (matched.role === 'textAdvice') {
          target.textAdviceToken = opt.token;
        }
      }

      const out = [];
      const keys = Object.keys(byId);
      for (let j = 0; j < keys.length; j++) {
        const pair = byId[keys[j]];
        if (pair.reviewerToken && pair.reviewResultToken) {
          // 按钮名：有前缀显示"返修组1"，否则"审核组1"
          pair.label = pair.prefix
            ? (pair.prefix + '\u7ec4' + pair.num)
            : ('\u5ba1\u6838\u7ec4 ' + pair.num);
          out.push(pair);
        }
      }

      out.sort(function(a, b) {
        const na = Number(a.num || 0), nb = Number(b.num || 0);
        if (na !== nb) return na - nb;
        return (a.prefix || '').localeCompare(b.prefix || '');
      });
      return out;
    }


    function renderReviewGroupSelector() {
      const wrap = document.getElementById('reviewGroupButtons');
      if (!wrap) return;

      reviewGroupPairs = detectReviewGroupPairs();
      wrap.innerHTML = '';
      
      if (!reviewGroupPairs.length) {
        wrap.innerHTML = '<div class="hint" style="margin:0; font-size:11px; line-height: 1.5; color: #b42318; background: #fff1f1; padding: 8px; border-radius: 6px; border: 1px solid #ffdcdc;">' +
          '<strong>未识别到自动审核组。</strong><br/>' +
          '请确保表头包含数字后缀（如：审核人员1、审核结果1）。<br/>' +
          '建议格式：<br/>' +
          '• 组1：审核人员1、审核结果1、文字建议1<br/>' +
          '• 组2：审核人员2、审核结果2、文字建议2' +
          '</div>';
        return;
      }

      const curReviewer = getFieldTokenFromCurrentSettings('reviewer');
      const curResult = getFieldTokenFromCurrentSettings('reviewResult');
      let activeFound = false;

      reviewGroupPairs.forEach(function(pair) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'group-tab-btn';
        
        const isActive = pair.reviewerToken === curReviewer && pair.reviewResultToken === curResult;
        if (isActive) {
          btn.classList.add('active');
          activeFound = true;
        }

        btn.textContent = pair.label;
        btn.title = pair.reviewerHeader + ' / ' + pair.reviewResultHeader;
        btn.disabled = isReviewGroupSwitching;
        btn.onclick = function() { applyReviewGroup(pair.id); };
        wrap.appendChild(btn);
      });

      // 自定义项（当没匹配到任何预设组时显示）
      const customBtn = document.createElement('button');
      customBtn.type = 'button';
      customBtn.className = 'group-tab-btn';
      customBtn.textContent = '自定义';
      customBtn.disabled = isReviewGroupSwitching;
      if (!activeFound) customBtn.classList.add('active');
      customBtn.onclick = function() {
        var allBtns = wrap.querySelectorAll('.group-tab-btn');
        for (var k = 0; k < allBtns.length; k++) allBtns[k].classList.remove('active');
        customBtn.classList.add('active');
        setStatus('当前为自定义模式，可在「列设置」中手动调整各列映射');
      };
      wrap.appendChild(customBtn);
    }

    function applyReviewGroup(groupId) {
      if (isReviewGroupSwitching) return;
      const id = String(groupId || '').trim();
      const pair = reviewGroupPairs.find(function(p) { return String(p.id) === id; });
      if (!pair || !currentSettings) return;
      currentSettings.columns = currentSettings.columns || {};
      currentSettings.columnMappingMode = 'custom';
      isReviewGroupSwitching = true;
      if (reviewGroupSwitchHintTimer) {
        clearTimeout(reviewGroupSwitchHintTimer);
        reviewGroupSwitchHintTimer = null;
      }
      setReviewGroupSwitchHint('正在切换到 ' + pair.label + ' ...', true);

      function applyTokenIfPresent(fieldKey, token) {
        if (!token) return;
        currentSettings.columns[fieldKey] = { mode: 'header', value: token };
      }
      applyTokenIfPresent('reviewer', pair.reviewerToken);
      applyTokenIfPresent('reviewResult', pair.reviewResultToken);
      applyTokenIfPresent('severity', pair.severityToken);
      applyTokenIfPresent('shotLink', pair.shotLinkToken);
      applyTokenIfPresent('shotFormula', pair.shotFormulaToken);
      applyTokenIfPresent('textAdvice', pair.textAdviceToken);

      renderSettingsRows();
      renderMappedColumnHints();
      renderReviewGroupSelector();
      setStatus('已切换到审核组 ' + id + ' 并联动相关列，刷新中...');
      refreshBatchData(true, { reason: 'groupSwitch', groupLabel: pair.label });
    }

    function ensureRowDataObject(row) {
      const r = Number(row);
      if (!rowsDataMap[r]) rowsDataMap[r] = { row: r, cells: {} };
      return rowsDataMap[r];
    }

    function getRowIdentityKeyByRow(row) {
      const data = rowsDataMap[Number(row)] || null;
      return String(data && data.rowKey || '').trim();
    }

    function getRowIdByRow(row) {
      const data = rowsDataMap[Number(row)] || null;
      return String(data && data.rowId || '').trim();
    }

    // 行迁移标记：当检测到行号移位时，标记需要全量刷新
    let _pendingFullRefresh = false;

    function migrateRowContext(fromRow, toRow) {
      if (!init) return;
      const from = Number(fromRow || 0);
      const to = Number(toRow || 0);
      if (!from || !to || from === to) return;

      // 检测到行移位 → 标记需要全量刷新
      // 不再逐个修补 selectedRows，因为其他行可能也移位了
      console.log('[RowRelocate] 检测到行移位: ' + from + ' → ' + to + '，将触发全量刷新');

      // 仅更新当前行的 rowsDataMap（不覆盖已有数据）
      const idx = init.selectedRows.indexOf(from);
      if (idx >= 0) {
        // 如果 toRow 不在 selectedRows 中，就地更新行号
        const existingIdx = init.selectedRows.indexOf(to);
        if (existingIdx < 0) {
          init.selectedRows[idx] = to;
        }
        // 如果 toRow 已存在，不做 splice（避免跳行），等全量刷新修正
      }

      // 迁移 rowsDataMap 但不覆盖已有的 toRow 数据
      const fromData = rowsDataMap[from];
      if (fromData && !rowsDataMap[to]) {
        rowsDataMap[to] = Object.assign({}, fromData, { row: to });
      }
      if (fromData) delete rowsDataMap[from];

      // 迁移草稿
      const draft = loadLocalDraft(from);
      if (draft) {
        saveLocalDraft(to, draft);
        clearLocalDraft(from);
      }

      // 标记全量刷新（延迟执行，避免重复刷新）
      if (!_pendingFullRefresh) {
        _pendingFullRefresh = true;
        setTimeout(function() {
          _pendingFullRefresh = false;
          console.log('[RowRelocate] 执行全量刷新');
          // 保存当前正在编辑的草稿
          if (!isApplyingRow) {
            updateCurrentRowDataFromInputs(false);
            const cr = currentRow();
            saveLocalDraft(cr, {
              reviewer: document.getElementById('reviewer').value.trim(),
              reviewResult: document.getElementById('reviewResult').value,
              severity: document.getElementById('severity').value,
              textAdvice: document.getElementById('textAdvice').value
            });
          }
          refreshBatchData(true, { reason: 'relocation', silent: true });
        }, 800);
      }
    }

    function setRowSyncState(row, state, message) {
      const data = ensureRowDataObject(row);
      data._syncState = String(state || '');
      data._syncMessage = String(message || '');
      data._syncAt = Date.now();
    }

    function getRowSyncInfo(data) {
      const st = String(data && data._syncState || '');
      if (!st) return null;
      const map = {
        dirty: { text: '待保存', cls: 'row-sync-dirty' },
        saving: { text: '保存中', cls: 'row-sync-saving' },
        saved: { text: '已保存', cls: 'row-sync-saved' },
        save_failed: { text: '保存失败', cls: 'row-sync-failed' },
        submitting: { text: '提交中', cls: 'row-sync-submitting' },
        submitted: { text: '已提交', cls: 'row-sync-submitted' },
        submit_failed: { text: '提交失败', cls: 'row-sync-failed' }
      };
      return map[st] || null;
    }

    function getReviewResultVisualClass(value) {
      const txt = String(value || '').trim().toLowerCase();
      if (!txt || txt === '-') return 'row-status-unknown';

      if (
        txt.indexOf('可以使用') >= 0 ||
        txt.indexOf('通过') >= 0 ||
        txt.indexOf('可用') >= 0 ||
        txt.indexOf('pass') >= 0
      ) {
        return 'row-status-pass';
      }

      if (
        txt.indexOf('需要修改') >= 0 ||
        txt.indexOf('需修改') >= 0 ||
        txt.indexOf('修改') >= 0 ||
        txt.indexOf('待修改') >= 0 ||
        txt.indexOf('revise') >= 0
      ) {
        return 'row-status-edit';
      }

      if (
        txt.indexOf('不可以使用') >= 0 ||
        txt.indexOf('不可用') >= 0 ||
        txt.indexOf('驳回') >= 0 ||
        txt.indexOf('拒绝') >= 0 ||
        txt.indexOf('reject') >= 0
      ) {
        return 'row-status-reject';
      }

      return 'row-status-unknown';
    }

    function uniqueNonEmptyOptions(list) {
      const out = [];
      const seen = {};
      (list || []).forEach(function(x) {
        const v = String(x || '').trim();
        if (!v || seen[v]) return;
        seen[v] = true;
        out.push(v);
      });
      return out;
    }

    function normalizeOptionItems(list) {
      const out = [];
      const seen = {};
      (list || []).forEach(function(item) {
        const value = typeof item === 'string'
          ? String(item || '').trim()
          : String(item && item.value || '').trim();
        if (!value || seen[value]) return;
        seen[value] = true;
        out.push({
          value: value,
          bg: String(item && item.bg || '').trim(),
          fg: String(item && item.fg || '').trim()
        });
      });
      return out;
    }

    function findOptionItemByValue(optionItems, value) {
      const target = String(value || '').trim();
      if (!target) return null;
      const list = optionItems || [];
      for (let i = 0; i < list.length; i++) {
        if (String(list[i] && list[i].value || '').trim() === target) return list[i];
      }
      return null;
    }

    function applySelectStyleByOption(select, optionItems) {
      if (!select) return;
      const matched = findOptionItemByValue(optionItems, select.value);
      if (matched && matched.bg && matched.bg.toLowerCase() !== '#ffffff') {
        select.style.backgroundColor = matched.bg;
        select.style.borderColor = matched.bg;
        select.style.color = matched.fg || '#222';
      } else {
        select.style.backgroundColor = '';
        select.style.borderColor = '';
        select.style.color = '';
      }
    }

    function renderQuickOptions(selectId, wrapId, options, maxCount) {
      const wrap = document.getElementById(wrapId);
      const select = document.getElementById(selectId);
      if (!wrap || !select) return;

      // 这里的 options 现在可能是 [{value, bg, fg}, ...] 或 [string, ...]
      const vals = (options || []).filter(function(o) {
        return o && (typeof o === 'string' ? o.trim() : (o.value && o.value.trim()));
      });
      
      const limited = typeof maxCount === 'number' && maxCount > 0
        ? vals.slice(0, maxCount)
        : vals;
      wrap.innerHTML = '';
      if (!limited.length) return;

      const current = String(select.value || '').trim();
      limited.forEach(function(o) {
        const v = typeof o === 'string' ? o : o.value;
        const bg = (o && o.bg) || '';
        const fg = (o && o.fg) || '';
        
        const btn = document.createElement('button');

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function shortText(s, maxLen) {
      const t = String(s || '');
      if (t.length <= maxLen) return t;
      return t.slice(0, maxLen) + '...';
    }

    function extractFirstUrl(s) {
      const matches = String(s || '').match(/https?:\/\/[^\s"'<>]+/ig) || [];
      for (let i = 0; i < matches.length; i++) {
        const cleaned = sanitizeUrlCandidate(matches[i]);
        if (/^https?:\/\/\S+/i.test(cleaned)) return cleaned;
      }
      return '';
    }

    function sanitizeUrlCandidate(input) {
      let url = String(input || '').trim();
      if (!url) return '';
      url = url
        .replace(/&amp;/gi, '&')
        .replace(/\u200B/g, '')
        .replace(/\uFEFF/g, '')
        .replace(/^[<\[\(\{'"`]+/, '')
        .replace(/[>\]\)\}'"`.,;:!?，。；：！？、）】》]+$/, '');

      const m = url.match(/^https?:\/\/(?:www\.)?google\.[^/]+\/url\?(.*)$/i);
      if (m && m[1]) {
        const params = new URLSearchParams(m[1]);
        const q = params.get('q') || params.get('url');
        if (q) {
          try {
            const decoded = decodeURIComponent(q);
            if (/^https?:\/\//i.test(decoded)) url = decoded;
          } catch (e) {
            if (/^https?:\/\//i.test(q)) url = q;
          }
        }
      }
      return url.trim();
    }

    function isSafeHttpUrl(url) {
      const text = String(url || '').trim();
      if (!text) return false;
      if (!/^https?:\/\//i.test(text)) return false;
      if (/[\u0000-\u001F\u007F]/.test(text)) return false;
      return true;
    }

    function createVideoElement(src) {
      const video = document.createElement('video');
      video.className = 'zoom-target';
      video.controls = true;

    function createIframeElement(src, className, allow, allowFullscreen) {
      const iframe = document.createElement('iframe');
      if (className) iframe.className = className;
      iframe.src = src;
      if (allow) iframe.setAttribute('allow', allow);
      if (allowFullscreen) iframe.setAttribute('allowfullscreen', '');
      return iframe;
    }

    function loadLocalDraft(row) {

    }

    function clearLocalDraft(row) {
      delete _draftCache[_draftKey(row)];
    }

    function mergeLocalDraft(row, patch) {
      const base = loadLocalDraft(row) || {};
      _draftCache[_draftKey(row)] = Object.assign({}, base, patch || {});

    function applyReviewerToRemainingRows(value) {

      for (let i = currentIndex; i < init.selectedRows.length; i++) {

    function isVideoUrl(url) {
      const u = sanitizeUrlCandidate(url);
      return /\.(mp4|mov|webm|m4v|ogg)(\?|#|$)/i.test(u);
    }

    function isImageUrl(url) {
      const u = sanitizeUrlCandidate(url);
      return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(u) || /i\.gyazo\.com/i.test(u);
    }

    function looksLikeVideoText(text) {
      return /\.(mp4|mov|webm|m4v|ogg)\b/i.test(String(text || ''));
    }

    function looksLikeImageText(text) {
      return /\.(png|jpe?g|gif|webp|bmp|svg)\b/i.test(String(text || ''));
    }

    function getYouTubeEmbed(url) {
      const m1 = url.match(/youtube\.com\/watch\?v=([^&]+)/i);
      if (m1) return 'https://www.youtube.com/embed/' + m1[1];
      const m2 = url.match(/youtu\.be\/([^?&]+)/i);
      if (m2) return 'https://www.youtube.com/embed/' + m2[1];
      return '';
    }

    function getDrivePreview(url) {
      const id = extractDriveFileId(url);
      if (id) {
        return appendDriveResourceKey(
          'https://drive.google.com/file/d/' + id + '/preview',
          extractDriveResourceKey(url)
        );
      }
      return '';
    }

    function isDriveFolderUrl(url) {
      const text = sanitizeUrlCandidate(url);
      if (!text) return false;
      if (!/drive\.google\.com/i.test(text)) return false;
      return /\/drive\/(?:u\/\d+\/)?folders\/[a-zA-Z0-9_-]+/i.test(text) ||
             /\/folders\/[a-zA-Z0-9_-]+/i.test(text) ||
             /drive\.google\.com\/folderview/i.test(text);
    }

    function extractDriveFileId(url) {
      const text = sanitizeUrlCandidate(url);
      if (!text) return '';

      let m = text.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/i);
      if (m && m[1]) return m[1];
      m = text.match(/docs\.google\.com\/(?:document|spreadsheets|presentation|forms|drawings)\/d\/([a-zA-Z0-9_-]+)/i);
      if (m && m[1]) return m[1];
      m = text.match(/[?&]id=([a-zA-Z0-9_-]+)/i);
      if (m && m[1]) return m[1];
      m = text.match(/\/uc\?(?:[^#]*&)?id=([a-zA-Z0-9_-]+)/i);
      if (m && m[1]) return m[1];
      return '';
    }

    function getDownloadUrl(url) {
      const id = extractDriveFileId(url);
      if (id) {
        return appendDriveResourceKey(
          'https://drive.google.com/uc?export=download&id=' + id,
          extractDriveResourceKey(url)
        );
      }
      return sanitizeUrlCandidate(url);
    }

    function getDriveViewUrl(url) {
      const id = extractDriveFileId(url);
      return id
        ? appendDriveResourceKey(
            'https://drive.google.com/uc?export=view&id=' + id,
            extractDriveResourceKey(url)
          )
        : '';
    }

    function getDriveThumbUrl(url, size) {
      const id = extractDriveFileId(url);
      if (!id) return '';
      const s = Number(size) > 0 ? Number(size) : 320;
      return appendDriveResourceKey(
        'https://drive.google.com/thumbnail?id=' + id + '&sz=w' + s,
        extractDriveResourceKey(url)
      );
    }

    function extractDriveResourceKey(url) {
      const text = sanitizeUrlCandidate(url);
      if (!text) return '';
      const m = text.match(/[?&]resourcekey=([^&#]+)/i);
      return m && m[1] ? m[1] : '';
    }

    function appendDriveResourceKey(url, resourceKey) {
      const rk = String(resourceKey || '').trim();
      if (!rk) return url;
      return url + (url.indexOf('?') >= 0 ? '&' : '?') + 'resourcekey=' + encodeURIComponent(rk);
    }

    function updatePreviewActionState() {
      const zoomable = (currentPreviewType === 'image' || currentPreviewType === 'video');
      ['zoomOutBtn', 'zoomInBtn', 'zoomResetBtn'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.disabled = !zoomable;
      });
      const dl = document.getElementById('downloadBtn');
      if (dl) dl.disabled = !currentPreviewUrl;
      const label = document.getElementById('zoomLabel');
      if (label) label.textContent = Math.round(previewScale * 100) + '%';

    function applyPreviewZoom() {
      const target = document.querySelector('#previewBox .zoom-target');
      if (target) {
        const canDrag = (currentPreviewType === 'image' && previewScale > 1);
        target.style.transform = 'translate(' + previewPanX + 'px,' + previewPanY + 'px) scale(' + previewScale + ')';
        target.style.cursor = canDrag ? (isPreviewDragging ? 'grabbing' : 'grab') : 'default';
      }
      const label = document.getElementById('zoomLabel');
      if (label) label.textContent = Math.round(previewScale * 100) + '%';
    }

    function resetPreviewZoom(silent) {
      previewScale = 1;
      previewPanX = 0;
      previewPanY = 0;
      isPreviewDragging = false;
      applyPreviewZoom();
      if (!silent) setStatus('缩放已重置');
    }

    function zoomInPreview() {
      if (!(currentPreviewType === 'image' || currentPreviewType === 'video')) return;
      previewScale = Math.min(4, previewScale + 0.12);
      applyPreviewZoom();
    }

    function zoomOutPreview() {
      if (!(currentPreviewType === 'image' || currentPreviewType === 'video')) return;
      previewScale = Math.max(0.5, previewScale - 0.12);
      applyPreviewZoom();
    }

    function handlePreviewWheel(event) {
      if (!(currentPreviewType === 'image' || currentPreviewType === 'video')) return;
      const box = document.getElementById('previewBox');
      if (!box || !box.contains(event.target)) return;
      event.preventDefault();
      if (event.deltaY < 0) {
        previewScale = Math.min(4, previewScale + 0.12);
      } else {
        previewScale = Math.max(0.5, previewScale - 0.12);
      }
      applyPreviewZoom();
    }

    function downloadCurrentPreview() {
      if (!currentPreviewUrl) return;
      const url = getDownloadUrl(currentPreviewUrl);
      window.open(url, '_blank');
    }

    function handlePreviewMouseDown(event) {
      const target = document.querySelector('#previewBox .zoom-target');
      if (!target) return;
      if (!(currentPreviewType === 'image' && previewScale > 1)) return;
      isPreviewDragging = true;
      previewDragStartX = event.clientX - previewPanX;
      previewDragStartY = event.clientY - previewPanY;
      applyPreviewZoom();
      event.preventDefault();
    }

    function handlePreviewMouseMove(event) {
      if (!isPreviewDragging) return;
      previewPanX = event.clientX - previewDragStartX;
      previewPanY = event.clientY - previewDragStartY;
      applyPreviewZoom();
      event.preventDefault();
    }

    function stopPreviewDrag() {
      if (!isPreviewDragging) return;

    function renderImagePreviewWithFallback(box, urls, onFail) {
      const seen = {};
      const candidates = (urls || [])
        .map(function(u) { return sanitizeUrlCandidate(u); })
        .filter(function(u) {
          if (!u || seen[u]) return false;
          seen[u] = true;
          return true;
        });

      if (!candidates.length) {
        box.innerHTML = '<div class="text-box">图片地址无效，无法预览。</div>';
        currentPreviewType = 'none';
        updatePreviewActionState();
        return;
      }

      const img = document.createElement('img');
      img.className = 'zoom-target';
      img.alt = 'image';
      let idx = 0;
      let loadingTimer = null;

      function clearLoadingTimer() {
        if (loadingTimer) {
          clearTimeout(loadingTimer);
          loadingTimer = null;
        }
      }

      function tryNext() {
        clearLoadingTimer();
        if (idx >= candidates.length) {
          if (typeof onFail === 'function') {
            onFail();
          } else {
            box.innerHTML = '<div class="text-box">图片预览失败，请点击下方链接在新窗口查看。</div>';
            currentPreviewType = 'none';
            updatePreviewActionState();
          }
          return;
        }
        img.src = candidates[idx++];
        loadingTimer = setTimeout(function() {
          tryNext();
        }, 1200);
      }

      img.addEventListener('load', function() {
        clearLoadingTimer();
      });
      img.addEventListener('error', tryNext);
      box.innerHTML = '';
      box.appendChild(img);
      currentPreviewType = 'image';
      updatePreviewActionState();
      applyPreviewZoom();
      tryNext();
    }

    function renderDriveEmbedPreview(box, previewUrl, asType) {
      const drive = getDrivePreview(previewUrl);
      if (isSafeHttpUrl(drive)) {
        box.innerHTML = '';
        box.appendChild(createIframeElement(drive, 'zoom-target', 'autoplay', false));
        currentPreviewType = asType || 'embed';
        updatePreviewActionState();
        applyPreviewZoom();
        return true;
      }
      return false;
    }

    function renderPreview(previewUrl, previewText) {
      const box = document.getElementById('previewBox');
      const linkEl = document.getElementById('sourceLink');
      const normalizedRawUrl = sanitizeUrlCandidate(previewUrl || '');
      const normalizedUrl = isSafeHttpUrl(normalizedRawUrl) ? normalizedRawUrl : '';
      currentPreviewUrl = normalizedUrl;
      currentPreviewType = 'none';
      resetPreviewZoom(true);

      if (normalizedUrl) {
        linkEl.innerHTML = '';
        const link = document.createElement('a');
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.href = normalizedUrl;
        link.textContent = normalizedUrl;
        linkEl.appendChild(link);
        if (isDriveFolderUrl(normalizedUrl)) {
          box.innerHTML = '<div class="text-box">检测到这是 Google Drive 文件夹链接，无法直接预览。请改为单个文件链接。</div>';
          currentPreviewType = 'none';
          updatePreviewActionState();
          return;
        }
        const driveId = extractDriveFileId(normalizedUrl);

        if (driveId && looksLikeVideoText(previewText)) {
          if (renderDriveEmbedPreview(box, normalizedUrl, 'video')) return;
          const downloadUrl = sanitizeUrlCandidate(getDownloadUrl(normalizedUrl));
          if (!isSafeHttpUrl(downloadUrl)) {
            box.innerHTML = '<div class="text-box">视频地址无效，无法预览。</div>';
            currentPreviewType = 'none';
            updatePreviewActionState();
            return;
          }
          box.innerHTML = '';
          box.appendChild(createVideoElement(downloadUrl));
          currentPreviewType = 'video';
          updatePreviewActionState();
          applyPreviewZoom();
          return;
        }
        if (driveId && looksLikeImageText(previewText)) {
          renderImagePreviewWithFallback(box, [
            getDriveThumbUrl(normalizedUrl, 1600)
          ], function() {
            if (!renderDriveEmbedPreview(box, normalizedUrl, 'image')) {
              box.innerHTML = '<div class="text-box">图片预览失败，请点击下方链接在新窗口查看。</div>';
              currentPreviewType = 'none';
              updatePreviewActionState();
            }
          });
          return;
        }

        const yt = getYouTubeEmbed(normalizedUrl);
        if (isSafeHttpUrl(yt)) {
          box.innerHTML = '';
          box.appendChild(createIframeElement(yt, '', '', true));
          currentPreviewType = 'embed';
          updatePreviewActionState();
          return;
        }
        if (renderDriveEmbedPreview(box, normalizedUrl, 'embed')) return;
        if (isVideoUrl(normalizedUrl)) {
          box.innerHTML = '';
          box.appendChild(createVideoElement(normalizedUrl));
          currentPreviewType = 'video';
          updatePreviewActionState();
          applyPreviewZoom();
          return;
        }
        if (isImageUrl(normalizedUrl)) {
          renderImagePreviewWithFallback(box, [normalizedUrl]);
          return;
        }
        box.innerHTML = '';
        box.appendChild(createIframeElement(normalizedUrl, '', '', false));
        currentPreviewType = 'embed';
        updatePreviewActionState();
        return;
      }

      linkEl.innerHTML = '';
      if (normalizedRawUrl) {
        box.innerHTML = '<div class="text-box">链接格式无效，无法预览。</div>';
        updatePreviewActionState();
        return;
      }
      if (previewText) {
        let hint = '未检测到可预览链接。';
        if (looksLikeVideoText(previewText) || looksLikeImageText(previewText)) {
          hint = '检测到文件名，但未读取到文件链接（可能是文件智能芯片链接未返回）。';
        }
        box.innerHTML = '<div class="text-box">' + escapeHtml(previewText) + '\n\n' + hint + '</div>';
      } else {
        box.innerHTML = '该单元格没有可预览内容';
      }
      updatePreviewActionState();
    }

    function renderPanelHeaderChecks() {
      const host = document.getElementById('panelHeaderChecks');
      host.innerHTML = '';
      const headers = init.viewHeaders || [];
      const selected = new Set((currentSettings && currentSettings.panelHeaders) || []);

      headers.forEach(h => {
        const label = document.createElement('label');
        label.className = 'header-check-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = h;
        cb.checked = selected.has(h);
        cb.addEventListener('change', function() {
          const arr = (currentSettings.panelHeaders || []).slice();
          if (cb.checked) {
            if (arr.indexOf(h) === -1) arr.push(h);
          } else {
            const next = arr.filter(x => x !== h);
            if (!next.length) {
              cb.checked = true;
              return;
            }
            currentSettings.panelHeaders = next;
            renderRowList();
            return;
          }
          currentSettings.panelHeaders = arr;
          renderRowList();
        });

        const text = document.createElement('span');
        text.textContent = h;

        label.appendChild(cb);
        label.appendChild(text);
        host.appendChild(label);
      });

    function getHeaderOptionsList() {
      const raw = Array.isArray(init && init.headerOptions) ? init.headerOptions : [];
      const out = [];
      const seen = {};

      raw.forEach(function(item) {
        const header = String(item && item.header || '').trim();
        const col = Number(item && item.col || 0);
        if (!header || !col) return;
        const token = String(item && item.token || ('__COL__' + col));
        if (seen[token]) return;
        seen[token] = true;
        out.push({
          header: header,
          col: col,
          token: token,
          label: String(item && item.label || (header + '（第 ' + col + ' 列）'))
        });
      });

      if (!out.length) {
        const headers = init.viewHeaders || [];
        headers.forEach(function(h, idx) {
          const header = String(h || '').trim();
          if (!header) return;
          const col = idx + 1;
          const token = '__COL__' + col;
          out.push({
            header: header,
            col: col,
            token: token,
            label: header + '（第 ' + col + ' 列）'
          });
        });
      }

      out.sort(function(a, b) { return a.col - b.col; });
      return out;
    }

    function findHeaderOptionsByHeaderName(headerName, headerOptions) {
      const target = String(headerName || '').trim();
      if (!target) return [];
      const list = headerOptions || getHeaderOptionsList();
      return list.filter(function(item) {
        return item.header === target;
      });
    }

    function findHeaderOptionTokenSmart(candidate, headerOptions) {
      const list = headerOptions || getHeaderOptionsList();
      const target = String(candidate || '').trim();
      if (!target || !list.length) return '';

      const exact = list.find(function(item) {
        return String(item.header || '').trim() === target;
      });
      if (exact) return exact.token;

      const normalizedTarget = target.replace(/\s+/g, '');
      const normalized = list.find(function(item) {
        return String(item.header || '').trim().replace(/\s+/g, '') === normalizedTarget;
      });
      if (normalized) return normalized.token;

      return '';
    }

    function resolveHeaderSelectionToken(value, fallbackHeader, isOptional, headerOptions) {
      const list = headerOptions || getHeaderOptionsList();
      if (!list.length) return '';

      const raw = String(value || '').trim();
      if (/^__COL__\d+$/.test(raw)) {
        const hit = list.find(function(item) { return item.token === raw; });
        if (hit) return hit.token;
      }

      const candidates = [];
      const seen = {};
      function pushCandidate(name) {
        const text = String(name || '').trim();
        if (!text || seen[text]) return;
        seen[text] = true;
        candidates.push(text);
      }
      function pushWithVariants(name) {
        const base = String(name || '').trim();
        if (!base) return;
        pushCandidate(base);
        pushCandidate(base + '1');
        pushCandidate(base + '2');
        const m = base.match(/^(.*?)(\d+)$/);
        if (m && m[1]) pushCandidate(String(m[1]).trim());
      }

      pushWithVariants(raw);
      pushWithVariants(fallbackHeader);

      for (let i = 0; i < candidates.length; i++) {
        const token = findHeaderOptionTokenSmart(candidates[i], list);
        if (token) return token;
      }

      return '';
    }

          letter.style.opacity = isHeader ? '0.45' : '1';
          letter.placeholder = isRange ? '如 数据验证!B2:B' : '如 E / AA';

        mode.addEventListener('change', applyMode);

    function normalizeText(s) {
      return String(s || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[^\u4e00-\u9fa5a-z0-9]/g, '');

    function getFieldHeaderCandidates(fieldKey) {
      const map = {
        preview: ['成品-单链接', '成品链接', '内容链接', '素材链接', '视频链接', '图片链接', '链接'],
        reviewer: ['审核人员1', '审核人', '审核人员', 'reviewer'],
        reviewerOptionsSource: ['审核人员1', '审核人', '审核人员', 'reviewer', '口播渲染人员'],
        reviewResult: ['审核结果1', '审核状态', '审核结果', '状态'],
        reviewResultOptionsSource: ['审核结果1', '审核状态', '审核结果', '状态'],
        severity: ['严重程度', '优先级', '紧急程度'],
        severityOptionsSource: ['严重程度', '优先级', '紧急程度'],
        shotLink: ['建议截图链接', '标注链接', '截图链接', '标注地址', '反馈截图链接'],
        shotFormula: ['建议截图公式', '缩略图', '截图公式', '标注缩略图', '图片公式'],
        textAdvice: ['文字建议', '建议反馈', '反馈建议', '建议']
      };
      return map[fieldKey] || [];
    }

    function findMatchesByCandidates(headers, candidates) {
      const normalizedHeaders = headers.map(h => ({ raw: h, n: normalizeText(h) }));
      const cand = candidates.map(c => normalizeText(c));
      const hits = [];
      normalizedHeaders.forEach(h => {
        for (let i = 0; i < cand.length; i++) {
          const c = cand[i];
          if (!c) continue;
          if (h.n === c || h.n.includes(c) || c.includes(h.n)) {
            hits.push(h.raw);
            break;
          }
        }
      });
      return Array.from(new Set(hits));
    }

    function autoMatchByHeader() {
      const headerRowSel = document.getElementById('headerRowSelect');
      const uiHeaderRow = Number(headerRowSel && headerRowSel.value ? headerRowSel.value : (currentSettings && currentSettings.headerRow) || 2);
      const activeHeaderRow = Number((currentSettings && currentSettings.headerRow) || 2);
      if (uiHeaderRow !== activeHeaderRow) {
        setStatus('你修改了表头行，请先点“保存设置”并刷新数据后再自动匹配。');
        return;
      }

      const headers = init.viewHeaders || [];
      const headerOptions = getHeaderOptionsList();
      const defs = init.fieldDefs || [];
      const rows = Array.from(document.querySelectorAll('.setting-row'));
      const rowMap = {};
      rows.forEach(r => { rowMap[r.dataset.key] = r; });

      let skippedAmbiguous = [];

      defs.forEach(def => {
        if (def.key === 'reviewerOptionsSource' ||
            def.key === 'reviewResultOptionsSource' ||
            def.key === 'severityOptionsSource') {
          return;
        }
        const row = rowMap[def.key];
        if (!row) return;
        const mode = row.querySelector('.setting-mode');
        const header = row.querySelector('.setting-header');

        const matches = findMatchesByCandidates(headers, getFieldHeaderCandidates(def.key));
        if (!matches.length) return;

        const matchedTokens = [];
        matches.forEach(function(name) {
          const hits = findHeaderOptionsByHeaderName(name, headerOptions);
          hits.forEach(function(item) {
            if (matchedTokens.indexOf(item.token) === -1) matchedTokens.push(item.token);
          });
        });
        if (!matchedTokens.length) return;

        if (
          (def.key === 'reviewer' ||
           def.key === 'reviewResult' ||
           def.key === 'reviewerOptionsSource' ||
           def.key === 'reviewResultOptionsSource' ||
           def.key === 'severity' ||
           def.key === 'severityOptionsSource') &&
          matchedTokens.length > 1
        ) {
          // 多个审核人/审核状态列时，不自动猜列，避免匹配错
          skippedAmbiguous.push(def.label + ': ' + matches.join(' / '));
          return;
        }

        mode.value = 'header';
        mode.dispatchEvent(new Event('change'));
        header.value = matchedTokens[0];
      });

      if (skippedAmbiguous.length) {
        setStatus('自动匹配完成（存在多候选列，已跳过：' + skippedAmbiguous.join('；') + '）');
      } else {
        setStatus('已按表头自动匹配，请检查后点击保存设置');
      }
    }

      if (!init || idx < 0 || idx >= screenshotDataUrls.length) return;
      const item = screenshotDataUrls[idx];

      const submitRow = currentRow();

      item.status = 'uploading';

    function fileToDataUrlPromise(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload = function() {
          resolve({
            dataUrl: String(reader.result || ''),
            name: file && file.name ? String(file.name) : '截图'
          });
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function addFilesToScreenshots(files) {
      const list = Array.from(files || []).filter(function(f) {
        return f && f.type && f.type.indexOf('image/') === 0;
      });
      if (!list.length) return 0;

      const startIndex = screenshotDataUrls.length;
      for (let i = 0; i < list.length; i++) {
        const one = await fileToDataUrlPromise(list[i]);
        if (one && one.dataUrl) {
          const newItem = {
            dataUrl: one.dataUrl,
            name: one.name,
            status: 'pending'
          };
          screenshotDataUrls.push(newItem);
        }
      }
      clearScreenshotFlag = false;
      renderShotPreviewList();
      refreshShotPickerText();

      // 自动开始上传新添加的项目
      for (let j = startIndex; j < screenshotDataUrls.length; j++) {
        uploadImageItem(j);
      }
      return list.length;
    }
