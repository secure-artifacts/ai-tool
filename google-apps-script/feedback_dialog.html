        head.appendChild(tag);
        head.appendChild(right);
        item.appendChild(head);

        const body = document.createElement('div');
        body.className = 'row-body';

        const driveId = extractDriveFileId(thumbUrl);
        if (thumbUrl) {
          if (isImageUrl(thumbUrl) || (driveId && looksLikeImageText(previewText))) {
            const img = document.createElement('img');
            img.className = 'row-thumb';
            img.src = (driveId && looksLikeImageText(previewText))
              ? (getDriveThumbUrl(thumbUrl, 160) || getDriveViewUrl(thumbUrl) || thumbUrl)
              : thumbUrl;
            img.alt = 'thumb';
            img.loading = 'lazy';
            img.addEventListener('error', function() {
              if (img.parentNode) img.parentNode.replaceChild(createImageBadgeElement(), img);
            });
            body.appendChild(img);
          } else if (isVideoUrl(thumbUrl) || (driveId && looksLikeVideoText(previewText))) {
            if (driveId) {
              const img = document.createElement('img');
              img.className = 'row-thumb';
              img.src = getDriveThumbUrl(thumbUrl, 240);
              img.alt = 'video-thumb';
              img.loading = 'lazy';
              img.addEventListener('error', function() {
                if (img.parentNode) img.parentNode.replaceChild(createVideoBadgeElement(), img);
              });
              body.appendChild(img);
            } else if (ENABLE_VIDEO_THUMB_PRELOAD_IN_LIST) {
              const videoSrc = (driveId && looksLikeVideoText(previewText)) ? getDownloadUrl(thumbUrl) : thumbUrl;
              const v = createVideoThumbElement(videoSrc);
              v.addEventListener('error', function() {
                if (v.parentNode) v.parentNode.replaceChild(createVideoBadgeElement(), v);
              });
              body.appendChild(v);
            } else {
              body.appendChild(createVideoBadgeElement());
            }
          }
        }

        const meta = document.createElement('div');
        meta.className = 'row-meta';
        headers.forEach(h => {
          const line = document.createElement('div');
          line.className = 'row-cell-line';
          let labelText = h;
          // 如果该列正是当前映射的“审核结果”列，则改名显示
          if (resultHeaderName && h === resultHeaderName) {
            labelText = '本次审核结果';
          }
          line.innerHTML = '<span class="row-cell-key">' + escapeHtml(labelText) + ':</span> ' + escapeHtml(shortText(data.cells && data.cells[h] || '', 36));
          meta.appendChild(line);
        });
        const adviceText = String(data.textAdvice || '').trim();
        if (adviceText) {
          const adviceLine = document.createElement('div');
          adviceLine.className = 'row-cell-line row-advice-line';
          adviceLine.innerHTML = '<span class="row-cell-key">建议:</span> ' + escapeHtml(shortText(adviceText, 40));
          meta.appendChild(adviceLine);
        }
        if (folderWarning) {
          const warning = document.createElement('div');
          warning.className = 'row-warning';
          warning.textContent = '提示：当前是文件夹链接，请换成单文件链接';
          meta.appendChild(warning);
        }

        body.appendChild(meta);
        item.appendChild(body);
        return item;
      }

      // DocumentFragment for batch DOM insertion + chunked rendering for large lists
      if (rows.length <= CHUNK) {
        const frag = document.createDocumentFragment();
        for (let i = 0; i < rows.length; i++) frag.appendChild(buildItem(rows[i], i));
        host.appendChild(frag);
      } else {
        let off = 0;
        (function renderChunk() {
          const frag = document.createDocumentFragment();
          const end = Math.min(off + CHUNK, rows.length);
          for (let i = off; i < end; i++) frag.appendChild(buildItem(rows[i], i));
          host.appendChild(frag);
          off = end;
          if (off < rows.length) requestAnimationFrame(renderChunk);
        })();
      }
    }

    function getCurrentRowData() {
      return rowsDataMap[currentRow()] || null;
    }

    function applyCurrentRowFromCache() {
      if (!init) return;
      updateCounter();

      const row = currentRow();
      document.getElementById('rowSelect').value = String(row);
      renderRowList();

      const data = getCurrentRowData();
      if (!data) {
        setStatus('该行数据未加载');
        return;
      }

      isApplyingRow = true;
      try {
        let previewUrl = data.previewUrl || '';
        let previewText = data.previewText || '';
        const vh = currentHeader();
        if (vh && vh !== '__CONFIG__') {
          const txt = (data.cells && data.cells[vh]) || '';
          previewUrl = extractFirstUrl(txt);
          previewText = txt;
        }
        renderPreview(previewUrl, previewText);

        const draft = loadLocalDraft(row);
        const reviewerOptions = normalizeOptionItems(data.reviewerOptions || []);
        const reviewerValues = reviewerOptions.map(function(item) { return item.value; });
        // 无草稿时默认空白（不预填表格里的旧值），只有本次会话内切换行时才恢复草稿
        const draftReviewer = draft && draft.reviewer !== undefined
          ? String(draft.reviewer || '').trim()
          : '';
        let reviewer = draftReviewer;
        if (draftReviewer && reviewerValues.length && reviewerValues.indexOf(draftReviewer) === -1) {
          reviewer = '';
        }
        if (isSyncReviewerEnabled() && sharedReviewerValue) {
          reviewer = sharedReviewerValue;
        }
        const reviewResult = draft && draft.reviewResult !== undefined ? draft.reviewResult : '';
        const severity = draft && draft.severity !== undefined ? draft.severity : '';
        const textAdvice = draft && draft.textAdvice !== undefined ? draft.textAdvice : '';

        setReviewerOptions(reviewerOptions, reviewer);
        setReviewResultOptions(data.reviewResultOptions || [], reviewResult);
        setSeverityOptions(data.severityOptions || [], severity);
        document.getElementById('textAdvice').value = textAdvice;
        clearShot();
      } finally {
        isApplyingRow = false;
      }

      setStatus('就绪');
    }

    function refreshBatchData(keepCurrent, context) {
      if (!init) return;
      const ctx = context || {};
      setStatus('批量读取中...');
      // 初始化加载(无 context) 和 主动批量刷新 都显示全屏遮罩
      if ((!ctx.reason || ctx.reason === 'refresh') && !ctx.silent) {
        toggleFullScreenLoading(true, '批量读取表格数据中...');
      }
      const keepRow = keepCurrent ? currentRow() : init.selectedRows[0];

      // 构建 rowIdMap：行号 → UUID，供后端重定位用
      const rowIdMap = {};
      init.selectedRows.forEach(function(row) {
        const data = rowsDataMap[row];
        if (data && data.rowId) {
          rowIdMap[row] = data.rowId;
        }
      });

      google.script.run
        .withSuccessHandler(function(res) {
          if (res.settings) currentSettings = deepClone(res.settings);
          if (Array.isArray(res.panelHeaders) && res.panelHeaders.length) {
            currentSettings.panelHeaders = res.panelHeaders.slice();
          }

          // 处理后端返回的行号重定位映射
          const mappings = res.rowMappings || [];
          if (mappings.length > 0) {
            console.log('[RefreshBatch] 后端行号重定位:', JSON.stringify(mappings));
            // 更新 selectedRows 中的行号
            for (let m = 0; m < mappings.length; m++) {
              const fromRow = mappings[m].from;
              const toRow = mappings[m].to;
              const idx = init.selectedRows.indexOf(fromRow);
              if (idx >= 0) {
                init.selectedRows[idx] = toRow;
              }
              // 迁移草稿到新行号
              const draft = loadLocalDraft(fromRow);
              if (draft) {
                saveLocalDraft(toRow, draft);
                clearLocalDraft(fromRow);
              }
            }
          }

          // 更新 selectedRows 以匹配后端实际返回的行号
          const returnedRows = (res.rowsData || []).map(function(item) { return item.row; });
          if (returnedRows.length > 0) {
            init.selectedRows = returnedRows.slice();
          }

          rowsDataMap = {};
          (res.rowsData || []).forEach(item => {
            rowsDataMap[item.row] = item;
          });

          // 找到之前正在查看的行在新列表中的位置
          let newKeepRow = keepRow;
          // 如果 keepRow 被重定位了，找到新行号
          for (let m = 0; m < mappings.length; m++) {
            if (mappings[m].from === keepRow) {
              newKeepRow = mappings[m].to;
              break;
            }
          }
          const idx = init.selectedRows.indexOf(newKeepRow);
          currentIndex = idx >= 0 ? idx : 0;

          // 重建行选择器
          const rowSelect = document.getElementById('rowSelect');
          if (rowSelect) {
            rowSelect.innerHTML = '';
            init.selectedRows.forEach((r, i) => {
              const op = document.createElement('option');
              op.value = String(r);
              op.textContent = '第 ' + r + ' 行';
              if (i === currentIndex) op.selected = true;
              rowSelect.appendChild(op);
            });
          }

          if (ctx.reason === 'groupSwitch') {
            isReviewGroupSwitching = false;
          }
          renderReviewGroupSelector();
          renderMappedColumnHints();
          renderPanelHeaderChecks();
          renderRowList();
          applyCurrentRowFromCache();
          if (ctx.reason === 'groupSwitch') {
            setReviewGroupSwitchHint('已切换到 ' + (ctx.groupLabel || '目标组'), false);
            if (reviewGroupSwitchHintTimer) clearTimeout(reviewGroupSwitchHintTimer);
            reviewGroupSwitchHintTimer = setTimeout(function() {
              setReviewGroupSwitchHint('', false);
              reviewGroupSwitchHintTimer = null;
            }, 1600);
          }
          if (mappings.length > 0) {
            setStatus('已自动修正 ' + mappings.length + ' 行的位置（其他用户修改了表格）');
          }
          toggleFullScreenLoading(false);
          if (mappings.length === 0) setStatus('就绪');
        })
        .withFailureHandler(function(err) {
          if (ctx.reason === 'groupSwitch') {
            isReviewGroupSwitching = false;
            renderReviewGroupSelector();
            setReviewGroupSwitchHint('切换失败，请重试', false);
            if (reviewGroupSwitchHintTimer) clearTimeout(reviewGroupSwitchHintTimer);
            reviewGroupSwitchHintTimer = setTimeout(function() {
              setReviewGroupSwitchHint('', false);
              reviewGroupSwitchHintTimer = null;
            }, 2200);
          }
          toggleFullScreenLoading(false);
          setStatus('批量读取失败');
          alert('读取失败：' + (err && err.message ? err.message : err));
        })
        .getRowsBatchData({
          sheetName: init.sheetName,
          rows: init.selectedRows,
          settings: currentSettings,
          panelHeaders: currentSettings.panelHeaders,
          rowIdMap: rowIdMap
        });
    }

    function updateCurrentRowDataFromInputs(markDirty) {
      const row = currentRow();
      const data = ensureRowDataObject(row);
      data.reviewer = document.getElementById('reviewer').value.trim();
      data.reviewResult = document.getElementById('reviewResult').value;
      data.severity = document.getElementById('severity').value;
      data.textAdvice = document.getElementById('textAdvice').value;
      if (markDirty) setRowSyncState(row, 'dirty');
    }

    function getCurrentInputSnapshot() {
      return {
        row: currentRow(),
        reviewer: document.getElementById('reviewer').value.trim(),
        reviewResult: document.getElementById('reviewResult').value,
        severity: document.getElementById('severity').value,
        textAdvice: document.getElementById('textAdvice').value
      };
    }

    function scheduleAutoSave() {
      if (!init || isApplyingRow) return;
      updateCurrentRowDataFromInputs(true);

      const snapshot = getCurrentInputSnapshot();
      saveLocalDraft(snapshot.row, {
        reviewer: snapshot.reviewer,
        reviewResult: snapshot.reviewResult,
        severity: snapshot.severity,
        textAdvice: snapshot.textAdvice
      });

      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      const seq = ++autoSaveSeq;
      autoSaveTimer = setTimeout(function() {
        autoSaveTimer = null;
        performAutoSave(seq, snapshot);
      }, 1100);
    }

    function triggerImmediateAutoSave(statusMsg) {
      if (!init || isApplyingRow) return;
      if (!autoSaveTimer) return;
      updateCurrentRowDataFromInputs(true);
      renderRowList();

      const snapshot = getCurrentInputSnapshot();
      saveLocalDraft(snapshot.row, {
        reviewer: snapshot.reviewer,
        reviewResult: snapshot.reviewResult,
        severity: snapshot.severity,
        textAdvice: snapshot.textAdvice
      });

      if (autoSaveTimer) {
        clearTimeout(autoSaveTimer);
        autoSaveTimer = null;
      }
      const seq = ++autoSaveSeq;
      performAutoSave(seq, snapshot, statusMsg || '自动保存中...');
    }

    function performAutoSave(seq, snapshot, statusMsg) {
      if (!init) return;
      const payload = {
        sheetName: init.sheetName,
        row: snapshot.row,
        rowId: getRowIdByRow(snapshot.row),
        rowKey: getRowIdentityKeyByRow(snapshot.row),
        reviewer: snapshot.reviewer,
        reviewResult: snapshot.reviewResult,
        severity: snapshot.severity,
        textAdvice: snapshot.textAdvice,
        forceWrite: AUTO_FORCE_WRITE_ON_VALIDATION_MISMATCH,
        settings: currentSettings
      };

      setRowSyncState(payload.row, 'saving');
      renderRowList();
      setStatus(statusMsg || '自动保存中...');
      google.script.run
        .withSuccessHandler(function(res) {
          if (seq !== autoSaveSeq) return;
          const resolvedRow = Number(res && res.row || payload.row);
          if (resolvedRow && resolvedRow !== payload.row) {
            migrateRowContext(payload.row, resolvedRow);
            // 行移位后不清草稿，让全量刷新来处理
          }
          if (resolvedRow && rowsDataMap[resolvedRow]) {
            rowsDataMap[resolvedRow].rowId = String(res && res.rowId || rowsDataMap[resolvedRow].rowId || '').trim();
          }
          // 只清已确认保存成功的行的草稿，且不清当前正在编辑的行
          const activeRow = currentRow();
          if (resolvedRow !== activeRow) {
            clearLocalDraft(resolvedRow);
          }
          if (payload.row !== resolvedRow && payload.row !== activeRow) {
            clearLocalDraft(payload.row);
          }
          const data = ensureRowDataObject(resolvedRow);
          data.reviewer = payload.reviewer;
          data.reviewResult = payload.reviewResult;
          data.severity = payload.severity;
          data.textAdvice = payload.textAdvice;
          setRowSyncState(resolvedRow, 'saved');
          renderRowList();
          setStatus('已自动保存');
        })
        .withFailureHandler(function(err) {
          if (seq !== autoSaveSeq) return;
          setRowSyncState(payload.row, 'save_failed');
          renderRowList();
          setStatus('自动保存失败');
          console.error(err);
        })
        .autoSaveFeedbackDraft(payload);
    }

    function submitAllReviewed() {
      if (!init) return;
      updateCurrentRowDataFromInputs(true);
      renderRowList();

      const items = [];
      init.selectedRows.forEach(function(row) {
        const data = rowsDataMap[row] || {};
        const reviewer = String(data.reviewer || '').trim();
        const reviewResult = String(data.reviewResult || '').trim();
        const severity = String(data.severity || '').trim();
        const textAdvice = String(data.textAdvice || '').trim();
        if (!reviewer && !reviewResult && !severity && !textAdvice) return;
        items.push({
          row: row,
          rowId: getRowIdByRow(row),
          rowKey: getRowIdentityKeyByRow(row),
          reviewer: reviewer,
          reviewResult: reviewResult,
          severity: severity,
          textAdvice: textAdvice
        });
      });

      if (!items.length) {
        setStatus('没有可批量提交的内容');
        alert('没有检测到已填写的审核数据。');
        return;
      }

      const ok = confirm('将批量提交 ' + items.length + ' 行已填写内容，是否继续？');
      if (!ok) return;

      items.forEach(function(item) {
        setRowSyncState(item.row, 'submitting');
      });
      renderRowList();
      setStatus('批量提交中...');
      google.script.run
        .withSuccessHandler(function(res) {
          const rowMappings = res && Array.isArray(res.rowMappings) ? res.rowMappings : [];
          const successRows = res && Array.isArray(res.successRows) ? res.successRows : [];
          if (rowMappings.length) {
            rowMappings.forEach(function(mapItem) {
              const requested = Number(mapItem && mapItem.requestedRow || 0);
              const actual = Number(mapItem && mapItem.row || 0);
              if (requested && actual && requested !== actual) {
                migrateRowContext(requested, actual);
              }
              if (requested) clearLocalDraft(requested);
              if (actual) {
                clearLocalDraft(actual);
                if (rowsDataMap[actual]) {
                  rowsDataMap[actual].rowId = String(mapItem && mapItem.rowId || rowsDataMap[actual].rowId || '').trim();
                }
                setRowSyncState(actual, 'submitted');
              }
            });
          } else {
            successRows.forEach(function(row) {
              clearLocalDraft(row);
              setRowSyncState(row, 'submitted');
            });
          }

          if (currentRow() && rowsDataMap[currentRow()]) {
            applyCurrentRowFromCache();
          } else {
            renderRowList();
          }

          const errs = res && Array.isArray(res.errors) ? res.errors : [];
          errs.forEach(function(e) {
            setRowSyncState(Number(e.row || 0), 'submit_failed', e.message || '');
          });
          renderRowList();

          const errCount = errs.length;
          if (errCount) {
            const first = errs[0];
            setStatus('批量提交完成（部分失败）');
            alert(
              '批量提交完成：成功 ' + successRows.length +
              '，失败 ' + errCount +
              '。\n首个失败：第 ' + first.row + ' 行，' + first.message
            );
            return;
          }
          setStatus('批量提交成功：' + successRows.length + ' 行');
        })
        .withFailureHandler(function(err) {
          items.forEach(function(item) {
            setRowSyncState(item.row, 'submit_failed');
          });
          renderRowList();
          setStatus('批量提交失败');
          alert('批量提交失败：' + (err && err.message ? err.message : err));
        })
        .batchSubmitFeedback({
          sheetName: init.sheetName,
          settings: currentSettings,
          forceWrite: AUTO_FORCE_WRITE_ON_VALIDATION_MISMATCH,
          items: items
        });
    }

    function submitPayloadWithState(payload, goNextAfterSubmit, allowImmediateJump) {
      if (!init || !payload) return;
      const row = Number(payload.row || 0);
      if (!row) return;
      const idx = init.selectedRows.indexOf(row);
      const canJumpNow = !!goNextAfterSubmit && !!allowImmediateJump &&
        idx >= 0 && idx < init.selectedRows.length - 1;

      setRowSyncState(row, 'submitting');
      renderRowList();
      setStatus('提交中（第 ' + row + ' 行）...');

      if (canJumpNow) {
        switchToIndex(idx + 1, { skipAutoSave: true });
      }

      google.script.run
        .withSuccessHandler(function(res) {
          const resolvedRow = Number(res && res.row || row);
          if (resolvedRow && resolvedRow !== row) {
            migrateRowContext(row, resolvedRow);
          }
          if (resolvedRow && rowsDataMap[resolvedRow]) {
            rowsDataMap[resolvedRow].rowId = String(res && res.rowId || rowsDataMap[resolvedRow].rowId || '').trim();
          }
          clearLocalDraft(row);
          clearLocalDraft(resolvedRow);
          const data = ensureRowDataObject(resolvedRow);
          data.reviewer = String(payload.reviewer || '').trim();
          data.reviewResult = String(payload.reviewResult || '').trim();
          data.severity = String(payload.severity || '').trim();
          data.textAdvice = String(payload.textAdvice || '').trim();
          setRowSyncState(resolvedRow, 'submitted');
          renderRowList();
          setStatus('第 ' + resolvedRow + ' 行提交成功');
        })
        .withFailureHandler(function(err) {
          const msg = (err && err.message ? err.message : String(err || ''));
          if (!payload.forceWrite && msg.indexOf('必须使用下拉选项') >= 0) {
            const ok = confirm(
              '检测到与数据验证不匹配（第 ' + row + ' 行）：\n' + msg +
              '\n\n是否强行填写？'
            );
            if (ok) {
              const retryPayload = Object.assign({}, payload, { forceWrite: true });
              submitPayloadWithState(retryPayload, goNextAfterSubmit, false);
              return;
            }
          }
          setRowSyncState(row, 'submit_failed', msg);
          renderRowList();
          setStatus('第 ' + row + ' 行提交失败');
          alert('第 ' + row + ' 行提交失败：' + msg);
        })
        .submitFeedback(payload);
    }

    function submitData(goNextAfterSubmit, forceWrite) {

      submitPayloadWithState(payload, goNextAfterSubmit, true);
    }

      );
      scheduleAutoSave();
    });
    document.getElementById('textAdvice').addEventListener('input', function() {
      updateCurrentRowDataFromInputs(true);
      renderRowList();
      scheduleAutoSave();
    });

    let hasRestoredFromCache = false;
    try {
      const cachedStr = sessionStorage.getItem('feedbackDialogCache');
      if (cachedStr) {
        const cache = JSON.parse(cachedStr);
        if (cache && cache.init) {
          init = cache.init;
          currentSettings = cache.currentSettings || {};
          rowsDataMap = cache.rowsDataMap || {};
          currentIndex = cache.currentIndex || 0;
          hasRestoredFromCache = true;

          refreshShotPickerText();
          var overlay = document.getElementById('loadingOverlay');
          if (overlay) overlay.style.display = 'none';
          fillTopSelectors();
          renderSettingsRows();
          renderReviewGroupSelector();
          renderMappedColumnHints();
          renderPanelHeaderChecks();
          updatePreviewActionState();
          
          if (Object.keys(rowsDataMap).length > 0) {
            renderRowList();
            applyCurrentRowFromCache();
            setStatus('从缓存恢复，后台同步中...');
          }
        }
      }
    } catch(e) {}

    google.script.run
      .withSuccessHandler(function(res) {
        init = res;
        currentSettings = deepClone(res.settings || {});
        if (!currentSettings.panelHeaders || !currentSettings.panelHeaders.length) {
          const defaults = ['提交人员', '成品-单链接'].filter(h => (res.viewHeaders || []).indexOf(h) >= 0);
          currentSettings.panelHeaders = defaults.length ? defaults : [res.viewHeaders[0]];
        }
        
        if (!hasRestoredFromCache) {
          refreshShotPickerText();
          // 立刻渲染 UI 骨架（选项框、工具栏等）
          var overlay = document.getElementById('loadingOverlay');
          if (overlay) overlay.style.display = 'none';
          fillTopSelectors();
          renderSettingsRows();
          renderReviewGroupSelector();
          renderMappedColumnHints();
          renderPanelHeaderChecks();
          updatePreviewActionState();
          currentIndex = 0;
          rowsDataMap = {};
        }

        setStatus('同步最新数据中...');

        // 异步加载行数据（UI 已可见）
        refreshBatchData(false, { reason: 'init', silent: hasRestoredFromCache });
      })
      .withFailureHandler(function(err) {
        setStatus('初始化失败');
        alert('初始化失败：' + (err && err.message ? err.message : err));
      })
      .getDialogInit();
  </script>
</body>
</html>
